<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 480" width="640" height="480">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e2e8f0"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <linearGradient id="window" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#bfdbfe"/>
    </linearGradient>
  </defs>
  <!-- Sky background -->
  <rect width="640" height="480" fill="url(#sky)"/>
  <!-- Building -->
  <rect x="140" y="60" width="360" height="420" fill="#cbd5e1" rx="4"/>
  <rect x="155" y="75" width="330" height="390" fill="#94a3b8" rx="2"/>
  <!-- Windows row 1 -->
  <rect x="175" y="95" width="60" height="50" fill="url(#window)" rx="2"/>
  <rect x="250" y="95" width="60" height="50" fill="url(#window)" rx="2"/>
  <rect x="325" y="95" width="60" height="50" fill="url(#window)" rx="2"/>
  <rect x="400" y="95" width="60" height="50" fill="url(#window)" rx="2"/>
  <!-- Window people silhouettes -->
  <circle cx="205" cy="125" r="8" fill="#64748b" opacity="0.3"/>
  <circle cx="355" cy="125" r="8" fill="#64748b" opacity="0.3"/>
  <!-- Windows row 2 -->
  <rect x="175" y="165" width="60" height="50" fill="url(#window)" rx="2"/>
  <rect x="250" y="165" width="60" height="50" fill="url(#window)" rx="2"/>
  <rect x="325" y="165" width="60" height="50" fill="url(#window)" rx="2"/>
  <rect x="400" y="165" width="60" height="50" fill="url(#window)" rx="2"/>
  <!-- Windows row 3 -->
  <rect x="175" y="235" width="60" height="50" fill="url(#window)" rx="2"/>
  <rect x="250" y="235" width="60" height="50" fill="url(#window)" rx="2"/>
  <rect x="325" y="235" width="60" height="50" fill="url(#window)" rx="2"/>
  <rect x="400" y="235" width="60" height="50" fill="url(#window)" rx="2"/>
  <!-- Windows row 4 -->
  <rect x="175" y="305" width="60" height="50" fill="url(#window)" rx="2"/>
  <rect x="250" y="305" width="60" height="50" fill="url(#window)" rx="2"/>
  <rect x="325" y="305" width="60" height="50" fill="url(#window)" rx="2"/>
  <rect x="400" y="305" width="60" height="50" fill="url(#window)" rx="2"/>
  <!-- Entrance -->
  <rect x="280" y="390" width="80" height="90" fill="#475569" rx="3"/>
  <rect x="285" y="395" width="35" height="60" fill="#94a3b8" rx="1"/>
  <rect x="320" y="395" width="35" height="60" fill="#94a3b8" rx="1"/>
  <!-- Entrance glass reflection -->
  <rect x="310" y="400" width="3" height="50" fill="#64748b" opacity="0.3"/>
  <!-- Building sign -->
  <rect x="290" y="82" width="60" height="16" fill="#2563eb" rx="2"/>
  <text x="320" y="94" font-family="Arial" font-size="8" fill="white" text-anchor="middle" font-weight="bold">QIANFY</text>
  <!-- Clouds -->
  <ellipse cx="100" cy="40" rx="40" ry="15" fill="white" opacity="0.6"/>
  <ellipse cx="70" cy="38" rx="25" ry="12" fill="white" opacity="0.5"/>
  <ellipse cx="540" cy="50" rx="35" ry="12" fill="white" opacity="0.5"/>
  <ellipse cx="560" cy="46" rx="20" ry="10" fill="white" opacity="0.4"/>
  <!-- Ground -->
  <rect x="0" y="450" width="640" height="30" fill="#64748b" opacity="0.15"/>
  <!-- Trees -->
  <line x1="90" y1="430" x2="90" y2="390" stroke="#475569" stroke-width="3"/>
  <ellipse cx="90" cy="385" rx="20" ry="18" fill="#22c55e" opacity="0.6"/>
  <line x1="550" y1="430" x2="550" y2="395" stroke="#475569" stroke-width="3"/>
  <ellipse cx="550" cy="390" rx="18" ry="16" fill="#22c55e" opacity="0.6"/>
</svg>